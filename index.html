<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>File Converter PRO</title>
<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js"></script>
</head>

<body>

<h1 class="title">⚡ File Converter PRO</h1>

<div class="card">
    <input type="file" id="fileInput">
    <button onclick="handleFile()">Convert & Generate Link</button>
</div>

<div id="result"></div>

<div class="card destroy">
    <input type="text" id="destroyCode" placeholder="Enter code to destroy">
    <button onclick="destroyLink()">💀 Destroy Link</button>
</div>

<script src="storage.js"></script>
<script src="script.js"></script>
</body>
</html>
